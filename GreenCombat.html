<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Green Combat | Green Truth</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      :root {
        --bg-1: #dcedd6;
        --bg-2: #e6f3d3;
        --panel: #f2f4ef;
        --panel-soft: #edf0ea;
        --line: #dde4d5;
        --text: #252f42;
        --muted: #7b8294;
        --accent: #6dbd5f;
        --accent-2: #b6e89a;
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Poppins", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        background-color: #ffffff;
        color: var(--text);
      }
      .shell {
        min-height: 100vh;
        background: #f6f7f4;
        border: 1px solid #d8e1d0;
        border-radius: 14px;
        display: grid;
        grid-template-columns: 240px 1fr;
        overflow: hidden;
      }

      .sidebar {
        background: #f0f1ef;
        border-right: 1px solid #dde4d5;
        padding: 18px 14px;
        display: flex;
        flex-direction: column;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        font-size: 1.2rem;
        padding: 8px 10px;
        margin-bottom: 16px;
      }

      .brand-badge {
        width: 26px;
        height: 26px;
        border-radius: 8px;
        background: linear-gradient(140deg, var(--accent), var(--accent-2));
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 0.9rem;
      }

      .nav {
        display: grid;
        gap: 8px;
      }

      .nav a {
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 12px;
        border-radius: 10px;
        color: #596074;
        font-size: 0.92rem;
        font-weight: 500;
      }

      .nav a.active {
        background: var(--accent);
        color: #fff;
      }

      .promo {
        margin-top: auto;
        border-radius: 12px;
        padding: 16px;
        color: #fff;
        background: linear-gradient(155deg, #5f63f2, #6e8bff);
      }

      .promo h4 {
        margin: 0 0 6px;
      }

      .promo p {
        margin: 0 0 12px;
        font-size: 0.82rem;
        opacity: 0.92;
      }

      .promo button {
        border: none;
        border-radius: 8px;
        background: #fff;
        color: #4546a6;
        font-weight: 700;
        padding: 8px 12px;
        cursor: pointer;
      }

      .main {
        display: grid;
        grid-template-rows: auto 1fr;
        min-width: 0;
      }

      .topbar {
        height: 64px;
        border-bottom: 1px solid var(--line);
        padding: 0 20px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
      }

      .topbar h1 {
        margin: 0;
        font-size: 1.7rem;
      }

      .search {
        max-width: 380px;
        justify-self: center;
        width: 100%;
        height: 38px;
        background: var(--panel);
        border: 1px solid #e2e6df;
        border-radius: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
      }

      .search input {
        border: none;
        background: transparent;
        width: 100%;
        outline: none;
        font-size: 0.9rem;
      }
      #darkToggle {
        border: 1px solid #d1d7cc;
        background: #ffffff;
        color: #3b4659;
        border-radius: 999px;
        width: 34px;
        height: 34px;
        padding: 0;
        display: grid;
        place-items: center;
        font-size: 1rem;
      }

      body,
      .sidebar,
      .panel,
      .card,
      .asset-card,
      .map-card,
      .camera-section,
      .modal-card,
      button,
      input,
      textarea {
        transition:
          background 0.25s ease,
          background-color 0.25s ease,
          color 0.25s ease,
          border-color 0.25s ease;
      }

      body.dark {
        background-color: #1e1e1e;
        color: #eaeaea;
      }

      body.dark .shell {
        background: #1e1e1e;
        border-color: #3a3a3a;
      }

      body.dark .sidebar {
        background-color: #252526;
        border-right-color: #3a3a3a;
      }

      body.dark .main-content {
        background-color: #1e1e1e;
      }

      body.dark .topbar {
        border-bottom-color: #3a3a3a;
      }

      body.dark .topbar h1,
      body.dark #userLabel,
      body.dark .brand,
      body.dark .panel h3,
      body.dark .panel p,
      body.dark .checklist li,
      body.dark .empty-state,
      body.dark .tag,
      body.dark .note,
      body.dark .asset-title,
      body.dark .asset-description,
      body.dark #modelStatus,
      body.dark #confirmMessage,
      body.dark #verificationSteps {
        color: #eaeaea;
      }

      body.dark .nav a {
        color: #cfcfcf;
      }

      body.dark .nav a.active {
        color: #fff;
      }

      body.dark .nav a:hover:not(.active) {
        background: #121212;
      }

      body.dark .panel,
      body.dark .card,
      body.dark .asset-card,
      body.dark .map-card,
      body.dark .camera-section,
      body.dark .modal-card {
        background-color: #2d2d2d;
        border: 1px solid #3a3a3a;
      }

      body.dark .checklist li,
      body.dark .note,
      body.dark .asset-preview,
      body.dark .empty-state,
      body.dark #profile_avatar_preview {
        background: #252526;
        border-color: #3a3a3a;
      }

      body.dark button {
        background-color: #3a7d44;
        color: white;
      }

      body.dark .btn-neutral {
        background: #3a3a3a;
        color: #eaeaea;
      }

      body.dark .btn-danger {
        background: #6f2f2f;
        color: #ffffff;
      }

      body.dark input,
      body.dark textarea {
        background-color: #2d2d2d;
        color: white;
        border: 1px solid #444;
      }

      body.dark #darkToggle {
        background: #2d2d2d;
        border-color: #444;
        color: #eaeaea;
      }

      .language {
        font-size: 0.84rem;
        color: #6a7184;
      }

      .avatar {
        width: 34px;
        height: 34px;
        border-radius: 9px;
        background: linear-gradient(145deg, #f3b76d, #9f643a);
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 0.75rem;
        font-weight: 700;
      }

      #userLabel {
        max-width: 180px;
        font-size: 0.85rem;
        color: #596074;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .workspace {
        padding: 16px;
        display: grid;
        grid-template-columns: 1.35fr 1fr;
        grid-auto-rows: minmax(140px, auto);
        gap: 14px;
        align-content: start;
      }

      .panel {
        background: var(--panel-soft);
        border: 1px solid #e0e5dc;
        border-radius: 12px;
        padding: 16px;
      }

      .panel h3 {
        margin: 0 0 8px;
        font-size: 1.02rem;
      }

      .panel p {
        margin: 0;
        color: #000000;
        font-size: 0.9rem;
        line-height: 1.55;
      }

      .hero-panel {
        grid-column: 1 / -1;
        background: linear-gradient(120deg, #e7fbdc, #f3fff0);
      }

      .hero-panel .actions {
        margin-top: 14px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .hero-panel .actions a {
        text-decoration: none;
        border-radius: 9px;
        font-size: 0.85rem;
        font-weight: 600;
        padding: 9px 12px;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }

      .btn-ghost {
        background: #6dbd5f;
        color: #ffffff;
      }

      .checklist {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 8px;
      }

      .checklist li {
        padding: 10px 12px;
        border-radius: 8px;
        background: #f6f8f4;
        border: 1px solid #e5e9e1;
        display: flex;
        align-items: center;
        gap: 8px;
        color: #596074;
        font-size: 0.9rem;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 8px;
      }

      .tag {
        font-size: 0.78rem;
        padding: 5px 9px;
        border-radius: 999px;
        background: #e4e8ff;
        color: #4c53bb;
        border: 1px solid #d5dbff;
      }

      .note {
        width: 100%;
        min-height: 130px;
        margin-top: 8px;
        border-radius: 10px;
        border: 1px solid #dde3d9;
        background: #f9faf8;
        padding: 10px;
        resize: vertical;
        font-family: inherit;
      }

      @media (max-width: 1040px) {
        .workspace {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 860px) {
      .shell {
        min-height: 100vh;
        background: #f6f7f4;
        border: 1px solid #d8e1d0;
        border-radius: 14px;
        display: grid;
        grid-template-columns: 240px 1fr;
        overflow: hidden;
      }

        .sidebar {
          border-right: none;
          border-bottom: 1px solid var(--line);
          gap: 10px;
        }

        .promo {
          display: none;
        }

        .topbar {
          height: auto;
          padding: 12px;
          grid-template-columns: 1fr;
        }

        .search {
          justify-self: stretch;
          max-width: none;
        }
      }
          /* Responsive breakpoint normalization: small<=480, medium 481-768, large 769-1024, xl>=1025 */
      img,
      video,
      canvas,
      iframe {
        max-width: 100%;
      }

      a,
      button,
      input,
      select,
      textarea {
        min-height: 44px;
      }

      a:focus-visible,
      button:focus-visible,
      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible {
        outline: 2px solid #2e7d32;
        outline-offset: 2px;
      }

      .main-content,
      .workspace,
      .panel,
      .card,
      .asset-card,
      .map-card,
      .modal-card {
        min-width: 0;
      }

      @media (max-width: 480px) {
        .shell {
          min-height: 100dvh;
          border-radius: 0;
          border-left: 0;
          border-right: 0;
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: none;
          border-bottom: 1px solid var(--line);
          padding: 12px;
          gap: 8px;
        }

        .nav {
          grid-template-columns: 1fr;
          gap: 6px;
        }

        .nav a {
          padding: 10px 12px;
          font-size: 0.9rem;
        }

        .topbar {
          height: auto;
          padding: 12px;
          grid-template-columns: 1fr;
          gap: 10px;
        }

        .topbar h1 {
          font-size: clamp(1.3rem, 5vw, 1.55rem);
        }

        .user-area {
          display: flex;
          align-items: center;
          justify-content: space-between;
          flex-wrap: wrap;
          gap: 8px;
          width: 100%;
        }

        #userLabel {
          max-width: 100%;
          white-space: normal;
          overflow: visible;
          text-overflow: unset;
        }

        .search {
          width: 100%;
          max-width: none;
          justify-self: stretch;
        }

        .workspace {
          padding: 12px;
          gap: 12px;
          grid-template-columns: 1fr !important;
        }

        .assets-grid {
          grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        }

        .camera-controls {
          flex-direction: column;
        }

        .map-area {
          padding: 12px;
          min-height: 0;
          height: calc(100dvh - 190px);
        }

        #map {
          min-height: 320px;
        }

        .plant-sidebar {
          width: 100vw;
        }

        .hero-panel .actions,
        .actions {
          flex-direction: column;
          align-items: stretch;
        }

        .hero-panel .actions a,
        .btn-primary,
        .btn-ghost,
        .btn-neutral,
        .btn-danger,
        #confirmActionBtn {
          width: 100%;
          text-align: center;
          justify-content: center;
        }
      }

      @media (min-width: 481px) and (max-width: 768px) {
        .shell {
          min-height: 100dvh;
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: none;
          border-bottom: 1px solid var(--line);
          padding: 14px;
        }

        .nav {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 8px;
        }

        .topbar {
          height: auto;
          padding: 14px;
          grid-template-columns: 1fr;
          gap: 12px;
        }

        .user-area {
          display: flex;
          justify-content: space-between;
          flex-wrap: wrap;
          gap: 10px;
          width: 100%;
        }

        .search {
          width: 100%;
          max-width: none;
          justify-self: stretch;
        }

        .workspace {
          padding: 14px;
          gap: 14px;
          grid-template-columns: 1fr !important;
        }

        .assets-grid {
          grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        .map-area {
          padding: 14px;
          min-height: 0;
          height: calc(100dvh - 220px);
        }

        #map {
          min-height: 380px;
        }
      }

      @media (min-width: 769px) and (max-width: 1024px) {
        .shell {
          grid-template-columns: 220px 1fr;
        }

        .sidebar {
          padding: 16px 12px;
        }

        .topbar {
          padding: 0 16px;
        }

        .workspace {
          grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        }

        .hero-panel,
        .camera-section,
        .suggestion-card,
        .actions {
          grid-column: 1 / -1;
        }

        .map-area {
          padding: 16px;
          height: calc(100dvh - 120px);
        }
      }

      @media (min-width: 1025px) {
        .shell {
          grid-template-columns: 240px 1fr;
        }
      }
    
      /* Mobile sidebar drawer toggle */
      .user-area {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        flex-wrap: wrap;
      }

      .mobile-menu-toggle {
        display: none;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        border: 1px solid #d1d7cc;
        background: #ffffff;
        color: #3b4659;
        border-radius: 10px;
        padding: 0;
        cursor: pointer;
      }

      .mobile-menu-toggle .material-symbols-outlined {
        font-size: 1.3rem;
      }

      .mobile-menu-toggle:focus-visible,
      .nav a:focus-visible {
        outline: 2px solid #2e7d32;
        outline-offset: 2px;
      }

      .mobile-menu-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 20, 28, 0.4);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity 0.22s ease, visibility 0.22s ease;
        z-index: 1090;
      }

      body.menu-open {
        overflow: hidden;
      }

      body.menu-open .mobile-menu-overlay {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      body.dark .mobile-menu-toggle {
        background: #2d2d2d;
        border-color: #444;
        color: #eaeaea;
      }

      @media (max-width: 768px) {
        .user-area {
          display: grid;
          grid-template-columns: auto auto;
          grid-template-areas:
            "menu menu"
            "theme user";
          justify-content: end;
          justify-items: end;
          align-items: center;
          gap: 8px;
        }

        #mobileMenuToggle {
          grid-area: menu;
          justify-self: end;
        }

        #darkToggle {
          grid-area: theme;
        }

        #userLabel {
          grid-area: user;
          text-align: right;
        }

        .mobile-menu-toggle {
          display: inline-flex;
        }

        .sidebar {
          position: fixed;
          top: 0;
          left: 0;
          bottom: 0;
          width: min(280px, 84vw);
          max-width: 280px;
          border-right: 1px solid var(--line);
          border-bottom: none;
          transform: translateX(-100%);
          transition: transform 0.25s ease;
          z-index: 1100;
          overflow-y: auto;
        }

        body.menu-open .sidebar {
          transform: translateX(0);
        }
      }

      @media (min-width: 769px) {
        .mobile-menu-toggle {
          display: none !important;
        }

        .sidebar {
          position: static;
          transform: none !important;
          width: auto;
          max-width: none;
          z-index: auto;
        }

        .mobile-menu-overlay {
          display: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar" id="appSidebar">
        <div class="brand">
          <span class="brand-badge">&#10059;</span>
          <span>Green Truth</span>
        </div>

        <nav class="nav">
          <a href="dashboard.html"
            ><span class="material-symbols-outlined">dashboard</span
            >Dashboard</a
          >
          <a href="profile.html"
            ><span class="material-symbols-outlined">person</span>Profile</a
          >
          <a href="DigitalAssets.html"
            ><span class="material-symbols-outlined">storage</span>Digital
            Assets</a
          >
          <a href="GoGreenMap.html"
            ><span class="material-symbols-outlined">map</span>Go Green Map</a
          >
          <a href="GreenCalculator.html"
            ><span class="material-symbols-outlined">calculate</span>Green
            Calculator</a
          >
          <a class="active" href="GreenCombat.html"
            ><span class="material-symbols-outlined">sports_esports</span>Green
            Combat</a
          >
          <a href="ConfirmAction.html"
            ><span class="material-symbols-outlined">check_box</span>Confirm
            Action</a
          >
          <a href="login.html"
            ><span class="material-symbols-outlined">logout</span>Sign Out</a
          >
        </nav>
      </aside>

      <section class="main main-content">
        <header class="topbar">
          <h1>Green Combat</h1>
          <div class="user-area">
                        <button
              id="mobileMenuToggle"
              class="mobile-menu-toggle"
              type="button"
              aria-label="Open navigation menu"
              aria-controls="appSidebar"
              aria-expanded="false"
            >
              <span class="material-symbols-outlined">menu</span>
            </button>
            <button id="darkToggle" type="button" aria-label="Toggle dark mode">&#127769;</button>
            <span id="userLabel">Guest User</span>
          </div>
        </header>
      </section>
    </div>
    <div id="mobileMenuOverlay" class="mobile-menu-overlay" hidden></div>

    <script>
      const SUPABASE_URL = "https://pnyjxbrkiifrsrtmnxro.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBueWp4YnJraWlmcnNydG1ueHJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDgxOTAsImV4cCI6MjA4ODE4NDE5MH0.uCYdN3SaANJZc5XqT1AdcbjlrFHCY7xaS2ff_y4z84c";

      const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const userLabel = document.getElementById("userLabel");
      const signOutBtn = document.getElementById("signOutBtn");
      const toggle = document.getElementById("darkToggle");
      toggle.onclick = () => {
        document.body.classList.toggle("dark");

        if (document.body.classList.contains("dark")) {
          localStorage.setItem("theme", "dark");
        } else {
          localStorage.setItem("theme", "light");
        }
      };
      function initMobileSidebarToggle() {
        const sidebar = document.getElementById("appSidebar");
        const menuToggleBtn = document.getElementById("mobileMenuToggle");
        const menuOverlay = document.getElementById("mobileMenuOverlay");

        if (!sidebar || !menuToggleBtn || !menuOverlay) return;

        const setMenuState = (isOpen) => {
          document.body.classList.toggle("menu-open", isOpen);
          menuToggleBtn.setAttribute("aria-expanded", String(isOpen));
          menuToggleBtn.setAttribute(
            "aria-label",
            isOpen ? "Close navigation menu" : "Open navigation menu",
          );

          const icon = menuToggleBtn.querySelector(".material-symbols-outlined");
          if (icon) {
            icon.textContent = isOpen ? "close" : "menu";
          }

          menuOverlay.hidden = !isOpen;
        };

        setMenuState(false);

        menuToggleBtn.addEventListener("click", () => {
          setMenuState(!document.body.classList.contains("menu-open"));
        });

        menuOverlay.addEventListener("click", () => {
          setMenuState(false);
        });

        sidebar.querySelectorAll(".nav a").forEach((link) => {
          link.addEventListener("click", () => {
            setMenuState(false);
          });
        });

        document.addEventListener("keydown", (event) => {
          if (
            event.key === "Escape" &&
            document.body.classList.contains("menu-open")
          ) {
            setMenuState(false);
          }
        });

        window.addEventListener("resize", () => {
          if (window.innerWidth > 768 && document.body.classList.contains("menu-open")) {
            setMenuState(false);
          }
        });
      }
      const theme = localStorage.getItem("theme");

      if (theme === "dark") {
        document.body.classList.add("dark");
      }

      initMobileSidebarToggle();

      _supabase.auth.onAuthStateChange((event, session) => {
        if (session) {
          userLabel.textContent = session.user.email;
        } else {
          window.location.href = "login.html";
        }
      });

      signOutBtn.addEventListener("click", async (event) => {
        event.preventDefault();
        const { error } = await _supabase.auth.signOut();
        if (!error) {
          window.location.href = "login.html";
        } else {
          console.error("Logout failed:", error.message);
        }
      });
    </script>
  </body>
</html>
