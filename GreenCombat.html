<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Green Combat | Green Truth</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      :root {
        --bg-1: #dcedd6;
        --bg-2: #e6f3d3;
        --panel: #f2f4ef;
        --panel-soft: #edf0ea;
        --line: #dde4d5;
        --text: #252f42;
        --muted: #7b8294;
        --accent: #6dbd5f;
        --accent-2: #b6e89a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Poppins", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        background: linear-gradient(115deg, var(--bg-1), var(--bg-2));
        color: var(--text);
      }

      .shell {
        max-width: 1320px;
        margin: 20px auto;
        min-height: calc(100vh - 40px);
        background: #f6f7f4;
        border: 1px solid #d8e1d0;
        border-radius: 14px;
        display: grid;
        grid-template-columns: 240px 1fr;
        overflow: hidden;
      }

      .sidebar {
        background: #f0f1ef;
        border-right: 1px solid #dde4d5;
        padding: 18px 14px;
        display: flex;
        flex-direction: column;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        font-size: 1.2rem;
        padding: 8px 10px;
        margin-bottom: 16px;
      }

      .brand-badge {
        width: 26px;
        height: 26px;
        border-radius: 8px;
        background: linear-gradient(140deg, var(--accent), var(--accent-2));
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 0.9rem;
      }

      .nav {
        display: grid;
        gap: 8px;
      }

      .nav a {
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 12px;
        border-radius: 10px;
        color: #596074;
        font-size: 0.92rem;
        font-weight: 500;
      }

      .nav a.active {
        background: var(--accent);
        color: #fff;
      }

      .nav a:hover:not(.active) {
        background: #e9ece6;
      }

      .promo {
        margin-top: auto;
        border-radius: 12px;
        padding: 16px;
        color: #fff;
        background: linear-gradient(155deg, #5f63f2, #6e8bff);
      }

      .promo h4 {
        margin: 0 0 6px;
      }

      .promo p {
        margin: 0 0 12px;
        font-size: 0.82rem;
        opacity: 0.92;
      }

      .promo button {
        border: none;
        border-radius: 8px;
        background: #fff;
        color: #4546a6;
        font-weight: 700;
        padding: 8px 12px;
        cursor: pointer;
      }

      .main {
        display: grid;
        grid-template-rows: auto 1fr;
        min-width: 0;
      }

      .topbar {
        height: 64px;
        border-bottom: 1px solid var(--line);
        padding: 0 20px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
      }

      .topbar h1 {
        margin: 0;
        font-size: 1.7rem;
      }

      .search {
        max-width: 380px;
        justify-self: center;
        width: 100%;
        height: 38px;
        background: var(--panel);
        border: 1px solid #e2e6df;
        border-radius: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
      }

      .search input {
        border: none;
        background: transparent;
        width: 100%;
        outline: none;
        font-size: 0.9rem;
      }

      .user-area {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .language {
        font-size: 0.84rem;
        color: #6a7184;
      }

      .avatar {
        width: 34px;
        height: 34px;
        border-radius: 9px;
        background: linear-gradient(145deg, #f3b76d, #9f643a);
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 0.75rem;
        font-weight: 700;
      }

      #userLabel {
        max-width: 180px;
        font-size: 0.85rem;
        color: #596074;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .workspace {
        padding: 16px;
        display: grid;
        grid-template-columns: 1.35fr 1fr;
        grid-auto-rows: minmax(140px, auto);
        gap: 14px;
        align-content: start;
      }

      .panel {
        background: var(--panel-soft);
        border: 1px solid #e0e5dc;
        border-radius: 12px;
        padding: 16px;
      }

      .panel h3 {
        margin: 0 0 8px;
        font-size: 1.02rem;
      }

      .panel p {
        margin: 0;
        color: #000000;
        font-size: 0.9rem;
        line-height: 1.55;
      }

      .hero-panel {
        grid-column: 1 / -1;
        background: linear-gradient(120deg, #e7fbdc, #f3fff0);
      }

      .hero-panel .actions {
        margin-top: 14px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .hero-panel .actions a {
        text-decoration: none;
        border-radius: 9px;
        font-size: 0.85rem;
        font-weight: 600;
        padding: 9px 12px;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }

      .btn-ghost {
        background: #6dbd5f;
        color: #ffffff;
      }

      .checklist {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 8px;
      }

      .checklist li {
        padding: 10px 12px;
        border-radius: 8px;
        background: #f6f8f4;
        border: 1px solid #e5e9e1;
        display: flex;
        align-items: center;
        gap: 8px;
        color: #596074;
        font-size: 0.9rem;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 8px;
      }

      .tag {
        font-size: 0.78rem;
        padding: 5px 9px;
        border-radius: 999px;
        background: #e4e8ff;
        color: #4c53bb;
        border: 1px solid #d5dbff;
      }

      .note {
        width: 100%;
        min-height: 130px;
        margin-top: 8px;
        border-radius: 10px;
        border: 1px solid #dde3d9;
        background: #f9faf8;
        padding: 10px;
        resize: vertical;
        font-family: inherit;
      }

      @media (max-width: 1040px) {
        .workspace {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 860px) {
        .shell {
          margin: 0;
          border-radius: 0;
          min-height: 100vh;
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: none;
          border-bottom: 1px solid var(--line);
          gap: 10px;
        }

        .promo {
          display: none;
        }

        .topbar {
          height: auto;
          padding: 12px;
          grid-template-columns: 1fr;
        }

        .search {
          justify-self: stretch;
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-badge">&#10059;</span>
          <span>Green Truth</span>
        </div>

        <nav class="nav">
          <a href="dashboard.html"
            ><span class="material-symbols-outlined">dashboard</span
            >Dashboard</a
          >
          <a href="profile.html"
            ><span class="material-symbols-outlined">person</span>Profile</a
          >
          <a href="DigitalAssets.html"
            ><span class="material-symbols-outlined">storage</span>Digital
            Assets</a
          >
          <a href="GoGreenMap.html"
            ><span class="material-symbols-outlined">map</span>Go Green Map</a
          >
          <a href="GreenCalculator.html"
            ><span class="material-symbols-outlined">calculate</span>Green
            Calculator</a
          >
          <a class="active" href="GreenCombat.html"
            ><span class="material-symbols-outlined">sports_esports</span>Green
            Combat</a
          >
          <a href="ConfirmAction.html"
            ><span class="material-symbols-outlined">check_box</span>Confirm
            Action</a
          >
          <a href="login.html"
            ><span class="material-symbols-outlined">logout</span>Sign Out</a
          >
        </nav>
      </aside>

      <section class="main">
        <header class="topbar">
          <h1>Green Combat</h1>
          <div class="user-area">
            <span id="userLabel">Guest User</span>
          </div>
        </header>

    <script>
      const SUPABASE_URL = "https://pnyjxbrkiifrsrtmnxro.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBueWp4YnJraWlmcnNydG1ueHJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDgxOTAsImV4cCI6MjA4ODE4NDE5MH0.uCYdN3SaANJZc5XqT1AdcbjlrFHCY7xaS2ff_y4z84c";

      const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const userLabel = document.getElementById("userLabel");
      const signOutBtn = document.getElementById("signOutBtn");

      _supabase.auth.onAuthStateChange((event, session) => {
        if (session) {
          userLabel.textContent = session.user.email;
        } else {
          window.location.href = "login.html";
        }
      });

      signOutBtn.addEventListener("click", async (event) => {
        event.preventDefault();
        const { error } = await _supabase.auth.signOut();
        if (!error) {
          window.location.href = "login.html";
        } else {
          console.error("Logout failed:", error.message);
        }
      });
    </script>
  </body>
</html>
