<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Assets | Green Truth</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-1: #dcedd6;
      --bg-2: #e6f3d3;
      --panel: #f2f4ef;
      --panel-soft: #edf0ea;
      --line: #dde4d5;
      --text: #252f42;
      --muted: #7b8294;
      --accent: #6dbd5f;
      --accent-2: #b6e89a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Poppins", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: linear-gradient(115deg, var(--bg-1), var(--bg-2));
      color: var(--text);
    }

    .shell {
      max-width: 1320px;
      margin: 20px auto;
      min-height: calc(100vh - 40px);
      background: #f6f7f4;
      border: 1px solid #d8e1d0;
      border-radius: 14px;
      display: grid;
      grid-template-columns: 240px 1fr;
      overflow: hidden;
    }

    .sidebar {
      background: #f0f1ef;
      border-right: 1px solid #dde4d5;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.2rem;
      padding: 8px 10px;
      margin-bottom: 16px;
    }

    .brand-badge {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      background: linear-gradient(140deg, var(--accent), var(--accent-2));
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 0.9rem;
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav a {
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      border-radius: 10px;
      color: #596074;
      font-size: 0.92rem;
      font-weight: 500;
    }

    .nav a.active {
      background: var(--accent);
      color: #fff;
    }

    .main {
      display: grid;
      grid-template-rows: auto 1fr;
      min-width: 0;
    }

    .topbar {
      height: 64px;
      border-bottom: 1px solid var(--line);
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }

    .topbar h1 {
      margin: 0;
      font-size: 1.7rem;
    }

    .user-area {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #userLabel {
      max-width: 180px;
      font-size: 0.85rem;
      color: #596074;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .workspace {
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr;
      grid-auto-rows: minmax(80px, auto);
      gap: 14px;
      align-content: start;
    }

    .panel {
      background: var(--panel-soft);
      border: 1px solid #e0e5dc;
      border-radius: 12px;
      padding: 16px;
    }

    .panel h3 {
      margin: 0;
      font-size: 1.02rem;
    }

    .assets-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .assets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .empty-state {
      color: var(--muted);
      text-align: center;
      padding: 20px;
      border: 1px dashed var(--line);
      border-radius: 10px;
      background: #f7faf5;
    }

    .asset-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
      transition:
        transform 180ms ease,
        box-shadow 180ms ease;
    }

    .asset-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.11);
    }

    .asset-preview {
      height: 130px;
      background: #eef3ea;
      border-bottom: 1px solid var(--line);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .asset-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .asset-preview .placeholder {
      color: #5b6475;
      font-weight: 700;
    }

    .asset-content {
      padding: 10px;
    }

    .asset-title {
      margin: 0 0 6px;
      font-size: 0.95rem;
    }

    .asset-description {
      margin: 0;
      color: #555;
      font-size: 0.86rem;
      line-height: 1.4;
      min-height: 2.8em;
      display: -webkit-box;
      line-clamp: 2;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .asset-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      transition: transform 120ms ease;
    }

    button:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-neutral {
      background: #e9efe5;
      color: #3b4659;
    }

    .btn-danger {
      background: #ffe9e9;
      color: #b12f2f;
    }

    .modal {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
      z-index: 50;
    }

    .modal.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
    }

    .modal-card {
      position: relative;
      width: min(92vw, 560px);
      max-height: 88vh;
      overflow: auto;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      opacity: 0;
      transform: scale(0.9);
      pointer-events: none;
      transition:
        opacity 220ms ease,
        transform 220ms ease;
    }

    .modal.active .modal-card {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .modal-head h4 {
      margin: 0;
    }

    .upload-form {
      display: grid;
      gap: 10px;
    }

    .upload-form label {
      font-size: 0.86rem;
      font-weight: 600;
    }

    .upload-form input,
    .upload-form textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      font: inherit;
    }

    .upload-form textarea {
      min-height: 90px;
      resize: vertical;
    }

    .status {
      min-height: 20px;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .preview-modal .modal-card {
      width: min(92vw, 900px);
    }

    .preview-body img,
    .preview-body video,
    .preview-body iframe {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
    }

    .preview-body iframe {
      min-height: 65vh;
    }

    @media (max-width: 860px) {
      .shell {
        margin: 0;
        border-radius: 0;
        min-height: 100vh;
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--line);
        gap: 10px;
      }

      .topbar {
        height: auto;
        padding: 12px;
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-badge">&#10059;</span>
        <span>Green Truth</span>
      </div>

      <nav class="nav">
        <a href="dashboard.html"><span class="material-symbols-outlined">dashboard</span>Dashboard</a>
        <a href="profile.html"><span class="material-symbols-outlined">person</span>Profile</a>
        <a class="active" href="DigitalAssets.html"><span class="material-symbols-outlined">storage</span>Digital
          Assets</a>
        <a href="GoGreenMap.html"><span class="material-symbols-outlined">map</span>Go Green Map</a>
        <a href="GreenCalculator.html"><span class="material-symbols-outlined">calculate</span>Green
          Calculator</a>
        <a href="GreenCombat.html"><span class="material-symbols-outlined">sports_esports</span>Green
          Combat</a>
        <a href="ConfirmAction.html"><span class="material-symbols-outlined">check_box</span>Confirm
          Action</a>
        <a id="signOutBtn" href="#"><span class="material-symbols-outlined">logout</span>Sign Out</a>
      </nav>
    </aside>

    <section class="main">
      <header class="topbar">
        <h1>Digital Assets</h1>
        <div class="user-area">
          <span id="userLabel">Guest User</span>
        </div>
      </header>

      <section id="digital-assets-workspace" class="workspace">
        <article class="panel">
          <div class="assets-toolbar">
            <h3>Asset Library</h3>
            <div style="display:flex;align-items:center;gap:12px">
              <label style="display:inline-flex;align-items:center;gap:6px;font-size:0.88rem;cursor:pointer">
                <input id="myAssetsSwitch" type="checkbox" /> My Assets
              </label>
              <button id="openUploadBtn" class="btn-primary" type="button">
                Upload Asset
              </button>
            </div>
          </div>
          <div id="assetGrid" class="assets-grid"></div>
          <div id="assetEmptyState" class="empty-state">No assets found.</div>
        </article>

        <div id="uploadModal" class="modal" aria-hidden="true">
          <div id="uploadModalOverlay" class="modal-overlay"></div>
          <div class="modal-card">
            <div class="modal-head">
              <h4>Upload Asset</h4>
              <button id="closeUploadBtn" class="btn-neutral" type="button">
                Close
              </button>
            </div>
            <form id="uploadForm" class="upload-form">
              <div>
                <label for="titleInput">Title *</label>
                <input id="titleInput" type="text" required />
              </div>
              <div>
                <label for="descriptionInput">Description</label>
                <textarea id="descriptionInput"></textarea>
              </div>
              <div>
                <label for="fileInput">File *</label>
                <input id="fileInput" type="file" accept="image/*,video/*,application/pdf,.pdf" required />
              </div>
              <div>
                <label for="externalLinkInput">External Link</label>
                <input id="externalLinkInput" type="url" placeholder="https://example.com" />
              </div>
              <button id="uploadBtn" class="btn-primary" type="submit">
                Upload
              </button>
              <div id="uploadStatus" class="status"></div>
            </form>
          </div>
        </div>

        <div id="previewModal" class="modal preview-modal" aria-hidden="true">
          <div id="previewModalOverlay" class="modal-overlay"></div>
          <div class="modal-card">
            <div class="modal-head">
              <h4 id="previewTitle">Preview</h4>
              <button id="closePreviewBtn" class="btn-neutral" type="button">
                Close
              </button>
            </div>
            <div id="previewBody" class="preview-body"></div>
          </div>
        </div>
      </section>
    </section>
  </div>

  <script>
    const SUPABASE_URL = "https://pnyjxbrkiifrsrtmnxro.supabase.co";
    const SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBueWp4YnJraWlmcnNydG1ueHJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDgxOTAsImV4cCI6MjA4ODE4NDE5MH0.uCYdN3SaANJZc5XqT1AdcbjlrFHCY7xaS2ff_y4z84c";

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const state = {
      assetsById: new Map(),
      orderedIds: [],
      isUploading: false,
      showOnlyMine: false,
      currentUserId: null,
    };
    const ASSET_BUCKET_CANDIDATES = ["assets", "plant-images"];

    const userLabel = document.getElementById("userLabel");
    const signOutBtn = document.getElementById("signOutBtn");
    const assetGrid = document.getElementById("assetGrid");
    const assetEmptyState = document.getElementById("assetEmptyState");

    const openUploadBtn = document.getElementById("openUploadBtn");
    const uploadModal = document.getElementById("uploadModal");
    const uploadModalOverlay = document.getElementById("uploadModalOverlay");
    const closeUploadBtn = document.getElementById("closeUploadBtn");

    const uploadForm = document.getElementById("uploadForm");
    const titleInput = document.getElementById("titleInput");
    const descriptionInput = document.getElementById("descriptionInput");
    const fileInput = document.getElementById("fileInput");
    const externalLinkInput = document.getElementById("externalLinkInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const uploadStatus = document.getElementById("uploadStatus");

    const previewModal = document.getElementById("previewModal");
    const previewModalOverlay = document.getElementById(
      "previewModalOverlay",
    );
    const closePreviewBtn = document.getElementById("closePreviewBtn");
    const previewTitle = document.getElementById("previewTitle");
    const previewBody = document.getElementById("previewBody");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function detectFileType(file) {
      const type = (file?.type || "").toLowerCase();
      const name = (file?.name || "").toLowerCase();
      if (type.startsWith("image/")) return "image";
      if (type.startsWith("video/")) return "video";
      if (type === "application/pdf" || name.endsWith(".pdf")) return "pdf";
      return null;
    }

    function renderThumbnail(asset) {
      if (asset.file_type === "image") {
        return `<img src="${escapeHtml(asset.thumbnail_url || asset.file_url)}" alt="${escapeHtml(asset.title || "Asset")}" loading="lazy" />`;
      }
      if (asset.file_type === "video")
        return `<div class="placeholder">VIDEO</div>`;
      if (asset.file_type === "pdf")
        return `<div class="placeholder">PDF</div>`;
      return `<div class="placeholder">FILE</div>`;
    }

    function renderAssets() {
      if (state.orderedIds.length === 0) {
        assetGrid.innerHTML = "";
        assetEmptyState.textContent = state.showOnlyMine
          ? "You have no assets yet."
          : "No assets found.";
        assetEmptyState.style.display = "block";
        return;
      }

      assetEmptyState.style.display = "none";

      const html = state.orderedIds
        .map((id) => {
          const asset = state.assetsById.get(id);
          if (!asset) return "";

          const isOwner = String(asset.user_id) === String(state.currentUserId);

          return `
                    <article class="asset-card" data-id="${escapeHtml(asset.id)}">
                      <div class="asset-preview">${renderThumbnail(asset)}</div>
                      <div class="asset-content">
                        <h4 class="asset-title">${escapeHtml(asset.title || "Untitled")}</h4>
                        <p class="asset-description">${escapeHtml(asset.description || "")}</p>
                        <div class="asset-actions">
                          <button class="btn-neutral" type="button" data-action="view">View</button>
                          ${asset.external_link ? '<button class="btn-neutral" type="button" data-action="link">Open Link</button>' : ""}
                          ${isOwner ? '<button class="btn-danger" type="button" data-action="delete">Delete</button>' : ""}
                        </div>
                      </div>
                    </article>
                  `;
        })
        .join("");

      assetGrid.innerHTML = html;
    }

    async function fetchAssets() {
      let query = _supabase
        .from("digital_assets")
        .select(
          "id,user_id,title,description,file_url,thumbnail_url,file_type,external_link,created_at",
        )
        .order("created_at", { ascending: false });

      if (state.showOnlyMine && state.currentUserId) {
        query = query.eq("user_id", state.currentUserId);
      }

      const { data, error } = await query;

      if (error) {
        console.error("[fetchAssets] Failed:", error);
        return;
      }

      state.assetsById.clear();
      state.orderedIds = [];
      for (const asset of data || []) {
        state.assetsById.set(asset.id, asset);
        state.orderedIds.push(asset.id);
      }

      renderAssets();
    }

    function openUploadModal() {
      uploadStatus.textContent = "";
      uploadModal.classList.add("active");
      uploadModal.setAttribute("aria-hidden", "false");
    }

    function closeUploadModal() {
      uploadModal.classList.remove("active");
      uploadModal.setAttribute("aria-hidden", "true");
    }

    function openPreviewModal(asset) {
      if (!asset) return;

      previewTitle.textContent = asset.title || "Preview";

      if (asset.file_type === "image") {
        previewBody.innerHTML = `<img src="${escapeHtml(asset.file_url)}" alt="${escapeHtml(asset.title || "image")}" />`;
      } else if (asset.file_type === "video") {
        previewBody.innerHTML = `<video src="${escapeHtml(asset.file_url)}" controls></video>`;
      } else if (asset.file_type === "pdf") {
        previewBody.innerHTML = `<iframe src="${escapeHtml(asset.file_url)}" title="${escapeHtml(asset.title || "pdf")}"></iframe>`;
      } else {
        previewBody.innerHTML = `<p>Preview unavailable.</p>`;
      }

      previewModal.classList.add("active");
      previewModal.setAttribute("aria-hidden", "false");
    }

    function closePreviewModal() {
      previewModal.classList.remove("active");
      previewModal.setAttribute("aria-hidden", "true");
      previewBody.innerHTML = "";
    }

    function storagePathFromUrl(url) {
      try {
        const parsed = new URL(url);
        const marker = "/storage/v1/object/public/";
        const markerIndex = parsed.pathname.indexOf(marker);
        if (markerIndex === -1) return null;

        const tail = parsed.pathname.slice(markerIndex + marker.length);
        const slashIndex = tail.indexOf("/");
        if (slashIndex === -1) return null;

        const bucket = tail.slice(0, slashIndex);
        const path = decodeURIComponent(tail.slice(slashIndex + 1));
        if (!bucket || !path) return null;
        return { bucket, path };
      } catch (error) {
        console.error("[storagePathFromUrl] Invalid url:", error);
        return null;
      }
    }

    async function uploadAsset(event) {
      event.preventDefault();
      if (state.isUploading) return;

      const title = titleInput.value.trim();
      const description = descriptionInput.value.trim();
      const link = externalLinkInput.value.trim();
      const file = fileInput.files?.[0] || null;

      if (!title || !file) {
        uploadStatus.textContent = "Title and file are required.";
        return;
      }

      const fileType = detectFileType(file);
      if (!fileType) {
        uploadStatus.textContent =
          "Only image, video, and PDF are supported.";
        return;
      }

      state.isUploading = true;
      uploadBtn.disabled = true;
      uploadBtn.textContent = "Uploading...";
      uploadStatus.textContent = "Uploading file...";

      try {
        const {
          data: { user },
        } = await _supabase.auth.getUser();
        console.log("Uploading as user:", user?.id);
        if (!user?.id) {
          uploadStatus.textContent = "User not authenticated";
          return;
        }

        const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
        const fileName = `${Date.now()}-${safeName}`;

        let uploadBucket = null;
        let lastUploadError = null;

        for (const bucket of ASSET_BUCKET_CANDIDATES) {
          const { error: uploadError } = await _supabase.storage
            .from(bucket)
            .upload(fileName, file, {
              cacheControl: "3600",
              contentType: file.type || undefined,
              upsert: false,
            });

          if (!uploadError) {
            uploadBucket = bucket;
            break;
          }

          lastUploadError = uploadError;
          if (
            !String(uploadError.message || "")
              .toLowerCase()
              .includes("bucket not found")
          ) {
            break;
          }
        }

        if (!uploadBucket) {
          console.error("[uploadAsset] Upload failed:", lastUploadError);
          uploadStatus.textContent = `Upload failed: ${lastUploadError?.message || "Unknown error"}`;
          return;
        }

        const { data: publicData } = _supabase.storage
          .from(uploadBucket)
          .getPublicUrl(fileName);
        const fileUrl = publicData?.publicUrl || null;
        if (!fileUrl) {
          uploadStatus.textContent = "Could not read uploaded file URL.";
          return;
        }

        const { error: insertError } = await _supabase
          .from("digital_assets")
          .insert({
            title,
            description: description || null,
            file_url: fileUrl,
            thumbnail_url: fileType === "image" ? fileUrl : null,
            file_type: fileType,
            external_link: link || null,
            user_id: user.id,
          });

        if (insertError) {
          console.error("[uploadAsset] Insert failed:", insertError);
          uploadStatus.textContent = `Failed to save metadata: ${insertError.message || "Unknown error"}`;
          return;
        }

        uploadStatus.textContent = "Upload completed.";
        uploadForm.reset();
        closeUploadModal();
        await fetchAssets();
      } catch (error) {
        console.error("[uploadAsset] Unexpected error:", error);
        uploadStatus.textContent = "Unexpected error.";
      } finally {
        state.isUploading = false;
        uploadBtn.disabled = false;
        uploadBtn.textContent = "Upload";
      }
    }

    async function deleteAsset(assetId) {
      const asset = state.assetsById.get(assetId);
      if (!asset) return;

      if (String(asset.user_id) !== String(state.currentUserId)) return;

      if (!confirm("Are you sure you want to delete this asset?")) return;

      try {
        const storageTarget = storagePathFromUrl(asset.file_url);
        if (storageTarget) {
          const { bucket, path } = storageTarget;
          const { error: removeError } = await _supabase.storage
            .from(bucket)
            .remove([path]);
          if (removeError) {
            console.error(
              "[deleteAsset] Storage remove failed:",
              removeError,
            );
          }
        }

        const { error: deleteError } = await _supabase
          .from("digital_assets")
          .delete()
          .eq("id", assetId);
        if (deleteError) {
          console.error("[deleteAsset] DB delete failed:", deleteError);
          return;
        }

        await fetchAssets();
      } catch (error) {
        console.error("[deleteAsset] Unexpected error:", error);
      }
    }

    _supabase.auth.onAuthStateChange((event, session) => {
      if (session) {
        state.currentUserId = session.user.id;
        userLabel.textContent = session.user.email;
        fetchAssets();
      } else {
        state.currentUserId = null;
        window.location.href = "login.html";
      }
    });

    document.getElementById("myAssetsSwitch").addEventListener("change", async (event) => {
      state.showOnlyMine = Boolean(event.target.checked);
      await fetchAssets();
    });

    signOutBtn.addEventListener("click", async (event) => {
      event.preventDefault();
      const { error } = await _supabase.auth.signOut();
      if (!error) {
        window.location.href = "login.html";
      } else {
        console.error("Logout failed:", error.message);
      }
    });

    openUploadBtn.addEventListener("click", openUploadModal);
    closeUploadBtn.addEventListener("click", closeUploadModal);
    uploadModalOverlay.addEventListener("click", closeUploadModal);

    closePreviewBtn.addEventListener("click", closePreviewModal);
    previewModalOverlay.addEventListener("click", closePreviewModal);

    uploadForm.addEventListener("submit", uploadAsset);

    assetGrid.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;

      const card = button.closest(".asset-card");
      const assetId = card?.dataset.id;
      if (!assetId) return;

      if (button.dataset.action === "view") {
        openPreviewModal(state.assetsById.get(assetId));
        return;
      }

      if (button.dataset.action === "link") {
        const asset = state.assetsById.get(assetId);
        if (asset?.external_link) {
          window.open(asset.external_link, "_blank", "noopener");
        }
        return;
      }

      if (button.dataset.action === "delete") {
        deleteAsset(assetId);
      }
    });
  </script>
</body>

</html>
