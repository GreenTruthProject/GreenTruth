<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go Green Map | Green Truth</title>

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0"
    />

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
      :root {
        --bg-1: #dcedd6;
        --bg-2: #e6f3d3;
        --panel: #f2f4ef;
        --panel-soft: #edf0ea;
        --line: #dde4d5;
        --text: #252f42;
        --muted: #7b8294;
        --accent: #6dbd5f;
        --accent-2: #b6e89a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Poppins", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        background: linear-gradient(115deg, var(--bg-1), var(--bg-2));
        color: var(--text);
      }

      .shell {
        max-width: 1320px;
        margin: 20px auto;
        min-height: calc(100vh - 40px);
        background: #f6f7f4;
        border: 1px solid #d8e1d0;
        border-radius: 14px;
        display: grid;
        grid-template-columns: 240px 1fr;
        overflow: hidden;
      }

      .sidebar {
        background: #f0f1ef;
        border-right: 1px solid #dde4d5;
        padding: 18px 14px;
        display: flex;
        flex-direction: column;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        font-size: 1.2rem;
        padding: 8px 10px;
        margin-bottom: 16px;
      }

      .brand-badge {
        width: 26px;
        height: 26px;
        border-radius: 8px;
        background: linear-gradient(140deg, var(--accent), var(--accent-2));
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 0.9rem;
      }

      .nav {
        display: grid;
        gap: 8px;
      }

      .nav a {
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 12px;
        border-radius: 10px;
        color: #596074;
        font-size: 0.92rem;
        font-weight: 500;
      }

      .nav a.active {
        background: var(--accent);
        color: #fff;
      }

      .nav a:hover:not(.active) {
        background: #e9ece6;
      }

      .main {
        display: grid;
        grid-template-rows: auto 1fr;
        min-width: 0;
      }

      .topbar {
        height: 64px;
        border-bottom: 1px solid var(--line);
        padding: 0 20px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
      }

      .topbar h1 {
        margin: 0;
        font-size: 1.7rem;
      }

      .user-area {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      #map {
        height: calc(100vh - 64px);
        width: 100%;
      }

      .popup-btn {
        width: 100%;
        margin: 4px 0;
        padding: 6px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        background: #6dbd5f;
        color: white;
        font-size: 0.85rem;
      }

      .popup-btn.delete {
        background: #e74c3c;
      }
      .plant-sidebar {
        position: fixed;
        top: 0;
        right: 0;
        width: min(420px, 92vw);
        height: 100vh;
        background: #ffffff;
        border-left: 1px solid var(--line);
        box-shadow: -8px 0 30px rgba(0, 0, 0, 0.12);
        transform: translateX(100%);
        transition: transform 0.25s ease;
        z-index: 2000;
        display: grid;
        grid-template-rows: auto auto 1fr auto;
      }

      .plant-sidebar.open {
        transform: translateX(0);
      }

      .plant-sidebar-head {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .plant-sidebar-head h2 {
        margin: 0;
        font-size: 1.05rem;
      }

      .plant-sidebar-close {
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 8px;
        padding: 6px 10px;
        cursor: pointer;
      }

      .plant-info {
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
        font-size: 0.92rem;
        line-height: 1.45;
      }

      .plant-info .label {
        color: var(--muted);
        margin-right: 4px;
      }

      .plant-logs {
        overflow: auto;
        padding: 12px;
      }

      .log-card {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        margin-bottom: 10px;
        background: #fcfdfb;
      }

      .log-note {
        margin: 0 0 8px;
        white-space: pre-wrap;
      }

      .log-image {
        width: 100%;
        border-radius: 8px;
        border: 1px solid var(--line);
        margin-bottom: 8px;
      }

      .log-time {
        color: var(--muted);
        font-size: 0.8rem;
      }

      .log-actions {
        margin-top: 8px;
        display: flex;
        justify-content: flex-end;
      }

      .log-delete-btn {
        padding: 6px 10px;
        border: 1px solid #cf2e2e;
        border-radius: 8px;
        background: #fff;
        color: #b3261e;
        font-size: 0.85rem;
        cursor: pointer;
      }

      .log-delete-btn:hover {
        background: #fff1f1;
      }
      .empty-state {
        color: var(--muted);
        text-align: center;
        margin: 30px 0;
      }

      .add-update {
        border-top: 1px solid var(--line);
        padding: 12px;
        display: grid;
        gap: 8px;
        background: #fbfcfa;
      }

      .add-update textarea {
        min-height: 76px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        font: inherit;
      }

      .add-update input[type="file"] {
        width: 100%;
      }

      .add-update button {
        border: none;
        border-radius: 8px;
        padding: 10px 12px;
        color: #fff;
        background: #2e7d32;
        cursor: pointer;
        font-weight: 600;
      }

      .add-update button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
    </style>
  </head>

  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-badge">&#10059;</span>
          <span>Green Truth</span>
        </div>

        <nav class="nav">
          <a href="dashboard.html">Dashboard</a>
          <a href="profile.html">Profile</a>
          <a href="DigitalAssets.html">Digital Assets</a>
          <a class="active" href="GoGreenMap.html">Go Green Map</a>
          <a href="GreenCalculator.html">Green Calculator</a>
          <a href="GreenCombat.html">Green Combat</a>
          <a id="signOutBtn" href="#">Sign Out</a>
        </nav>
      </aside>

      <section class="main">
        <header class="topbar">
          <h1>Go Green Map</h1>
          <div class="user-area">
            <span id="userLabel">Guest User</span>
          </div>
        </header>

        <div id="map"></div>
      </section>
    </div>
    <aside id="plantSidebar" class="plant-sidebar" aria-hidden="true">
      <div class="plant-sidebar-head">
        <h2>Plant Details</h2>
        <button
          id="closePlantSidebarBtn"
          class="plant-sidebar-close"
          type="button"
        >
          Close
        </button>
      </div>
      <div id="plantInfo" class="plant-info">
        <div class="empty-state">Click a marker to view plant details.</div>
      </div>
      <div id="plantLogs" class="plant-logs">
        <div class="empty-state">No logs loaded.</div>
      </div>
      <div class="add-update">
        <textarea
          id="logNoteInput"
          placeholder="Write an update note..."
        ></textarea>
        <input id="logFilesInput" type="file" accept="image/*" multiple />
        <button id="addUpdateBtn" type="button">Add Update</button>
      </div>
    </aside>
    <script>
      const SUPABASE_URL = "https://pnyjxbrkiifrsrtmnxro.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBueWp4YnJraWlmcnNydG1ueHJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDgxOTAsImV4cCI6MjA4ODE4NDE5MH0.uCYdN3SaANJZc5XqT1AdcbjlrFHCY7xaS2ff_y4z84c";

      const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const userLabel = document.getElementById("userLabel");
      const signOutBtn = document.getElementById("signOutBtn");
      const plantSidebar = document.getElementById("plantSidebar");
      const closePlantSidebarBtn = document.getElementById(
        "closePlantSidebarBtn",
      );
      const plantInfo = document.getElementById("plantInfo");
      const plantLogs = document.getElementById("plantLogs");
      const logNoteInput = document.getElementById("logNoteInput");
      const logFilesInput = document.getElementById("logFilesInput");
      const addUpdateBtn = document.getElementById("addUpdateBtn");

      _supabase.auth.onAuthStateChange((event, session) => {
        if (session) {
          currentUserId = session.user.id;
          userLabel.textContent = session.user.email;
          initMap();
          reloadPlants();
        } else {
          currentUserId = null;
          window.location.href = "login.html";
        }
      });

      signOutBtn.addEventListener("click", async (event) => {
        event.preventDefault();
        await _supabase.auth.signOut();
        window.location.href = "login.html";
      });

      let map;
      let markers = {};
      let plantMarkers = markers;
      let plantCache = {};
      let showOnlyMine = false;
      let currentUserId = null;
      let userLocationMarker = null;
      let userLocationWatchId = null;
      let selectedPlant = null;

      // ICONS
      const sproutIcon = L.icon({
        iconUrl: "resources/sprout.png",
        iconSize: [34, 34],
        iconAnchor: [17, 34],
        popupAnchor: [0, -30],
      });

      const leafIcon = L.icon({
        iconUrl: "resources/leaf.png",
        iconSize: [38, 38],
        iconAnchor: [19, 38],
        popupAnchor: [0, -34],
      });

      function initMap() {
        if (map) return;

        map = L.map("map").setView([10.762622, 106.660172], 13);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19,
        }).addTo(map);

        injectMapControls();
        loadPlants();
        realtime();
        startUserLocationTracking();

        map.on("click", handleClick);
      }

      // USER LOCATION
      function startUserLocationTracking() {
        if (!navigator.geolocation) return;

        userLocationWatchId = navigator.geolocation.watchPosition((pos) => {
          const { latitude, longitude } = pos.coords;

          if (!userLocationMarker) {
            userLocationMarker = L.marker([latitude, longitude], {
              icon: leafIcon,
            })
              .addTo(map)
              .bindPopup("You");
            map.setView([latitude, longitude], 16);
            return;
          }

          userLocationMarker.setLatLng([latitude, longitude]);
        });
      }

      // RENDER
      function normalizePlant(p) {
        return {
          ...p,
          lat: Number(p.lat ?? p.latitude),
          lng: Number(p.lng ?? p.longitude),
          owner: p.owner || null,
        };
      }

      function clearPlantMarkers() {
        Object.keys(plantMarkers).forEach((id) => {
          if (plantMarkers[id]) {
            map.removeLayer(plantMarkers[id]);
            delete plantMarkers[id];
          }
        });
        plantCache = {};
      }

      function renderMarker(rawPlant) {
        const p = normalizePlant(rawPlant);
        if (!Number.isFinite(p.lat) || !Number.isFinite(p.lng)) return;
        if (showOnlyMine && currentUserId && p.owner_id !== currentUserId) return;

        const marker = L.marker([p.lat, p.lng], {
          icon: sproutIcon,
        }).addTo(map);
        plantMarkers[p.id] = marker;
        plantCache[p.id] = p;

        const ownerText = p.owner?.email || p.owner_email || p.owner_id || "N/A";
        const canDelete = currentUserId && p.owner_id === currentUserId;
        const popup = `
    <div style="max-width:220px">
      <b>${escapeHtml(p.plant_name || "Plant")}</b><br/>
      <p>${escapeHtml(p.description || "")}</p>
      <div><b>Owner:</b> ${escapeHtml(ownerText)}</div>
      ${p.image_url ? `<img src="${escapeHtml(p.image_url)}" style="width:100%;border-radius:6px"/>` : ""}
      <button class="popup-btn" onclick="addPlantUpdate('${p.id}')">Add Update</button>
      <button class="popup-btn" onclick="viewInfo('${p.id}')">Info</button>
      ${canDelete ? `<button class="popup-btn delete" onclick="deletePlant('${p.id}')">Delete</button>` : ""}
    </div>
  `;

        marker.bindPopup(popup);
        marker.on("click", () => openSidebar(p));
      }

      // LOAD
      async function fetchLatestPlantImages(plantIds) {
        if (!plantIds || plantIds.length === 0) return {};

        const { data, error } = await _supabase
          .from("plant_logs")
          .select("plant_id,image_url,created_at")
          .in("plant_id", plantIds)
          .not("image_url", "is", null)
          .order("created_at", { ascending: false });

        if (error) {
          console.error("[fetchLatestPlantImages] Failed:", error);
          return {};
        }

        const latest = {};
        (data || []).forEach((row) => {
          if (!latest[row.plant_id] && row.image_url) {
            latest[row.plant_id] = row.image_url;
          }
        });
        return latest;
      }

      async function fetchOwnerMeta(ownerIds) {
        const uniqueIds = [...new Set((ownerIds || []).filter(Boolean))];
        if (uniqueIds.length === 0) return {};

        const { data, error } = await _supabase
          .from("profiles")
          .select("id,email,username")
          .in("id", uniqueIds);

        if (error) {
          console.error("[fetchOwnerMeta] Failed:", error);
          return {};
        }

        const ownerMap = {};
        (data || []).forEach((row) => {
          ownerMap[row.id] = row.email || row.username || null;
        });
        return ownerMap;
      }

      function applyOwnerMeta(plants, ownerMap) {
        return (plants || []).map((plant) => {
          const ownerEmail = ownerMap?.[plant.owner_id] || null;
          return {
            ...plant,
            owner_email: ownerEmail,
            owner: ownerEmail ? { email: ownerEmail } : null,
          };
        });
      }
      async function reloadPlants() {
        if (!map) return;
        clearPlantMarkers();

        let query = _supabase.from("plants").select("*");

        if (showOnlyMine && currentUserId) {
          query = query.eq("owner_id", currentUserId);
        }

        const { data, error } = await query;
        if (error) {
          console.error("[reloadPlants] Failed:", error);
          return;
        }

        const ownerMap = await fetchOwnerMeta((data || []).map((plant) => plant.owner_id));
        const plantsWithOwner = applyOwnerMeta(data || [], ownerMap);
        const normalizedPlants = plantsWithOwner.map(normalizePlant);
        const latestImages = await fetchLatestPlantImages(
          normalizedPlants.map((plant) => plant.id),
        );

        normalizedPlants.forEach((plant) => {
          if (!plant.image_url && latestImages[plant.id]) {
            plant.image_url = latestImages[plant.id];
          }
          renderMarker(plant);
        });
      }

      async function loadPlants() {
        await reloadPlants();
      }

      // CLICK -> CREATE PLANT
      let last = 0;

      function pickImageFile() {
        return new Promise((resolve) => {
          const overlay = document.createElement("div");
          overlay.style.position = "fixed";
          overlay.style.inset = "0";
          overlay.style.background = "rgba(0,0,0,0.35)";
          overlay.style.display = "flex";
          overlay.style.alignItems = "center";
          overlay.style.justifyContent = "center";
          overlay.style.zIndex = "9999";

          const box = document.createElement("div");
          box.style.background = "#fff";
          box.style.borderRadius = "10px";
          box.style.padding = "14px";
          box.style.width = "min(92vw, 360px)";
          box.style.boxShadow = "0 10px 30px rgba(0,0,0,0.2)";

          const title = document.createElement("p");
          title.textContent = "Choose an image for this plant (optional)";
          title.style.margin = "0 0 10px 0";

          const fileInput = document.createElement("input");
          fileInput.type = "file";
          fileInput.accept = "image/*";
          fileInput.style.width = "100%";
          fileInput.style.marginBottom = "12px";

          const actions = document.createElement("div");
          actions.style.display = "flex";
          actions.style.gap = "8px";
          actions.style.justifyContent = "flex-end";

          const skipBtn = document.createElement("button");
          skipBtn.type = "button";
          skipBtn.textContent = "Skip";
          skipBtn.style.padding = "8px 12px";
          skipBtn.style.border = "1px solid #ccc";
          skipBtn.style.borderRadius = "8px";
          skipBtn.style.background = "#fff";

          const useBtn = document.createElement("button");
          useBtn.type = "button";
          useBtn.textContent = "Use image";
          useBtn.style.padding = "8px 12px";
          useBtn.style.border = "none";
          useBtn.style.borderRadius = "8px";
          useBtn.style.background = "#2e7d32";
          useBtn.style.color = "#fff";

          const finish = (file) => {
            if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
            resolve(file || null);
          };

          skipBtn.onclick = () => finish(null);
          useBtn.onclick = () => finish(fileInput.files?.[0] || null);
          overlay.onclick = (event) => {
            if (event.target === overlay) finish(null);
          };

          actions.appendChild(skipBtn);
          actions.appendChild(useBtn);
          box.appendChild(title);
          box.appendChild(fileInput);
          box.appendChild(actions);
          overlay.appendChild(box);
          document.body.appendChild(overlay);
        });
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatDate(value) {
        if (!value) return "N/A";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "N/A";
        return date.toLocaleString();
      }

      async function createPlantAtLocation(lat, lng) {
        const {
          data: { user },
          error: userError,
        } = await _supabase.auth.getUser();

        if (userError || !user) {
          throw new Error("Unable to identify signed-in user.");
        }

        const name = prompt("Plant name:");
        const safeName = name && name.trim() ? name.trim() : "Plant";
        const desc = prompt("Description:");

        const { data: insertedRow, error: insertError } = await _supabase
          .from("plants")
          .insert([
            {
              latitude: lat,
              longitude: lng,
              plant_name: safeName,
              description: desc || null,
              owner_id: user.id,
              created_at: new Date().toISOString(),
            },
          ])
           .select("*")
          .single();

        if (insertError) {
          throw new Error(insertError.message || "Create point failed.");
        }

        const ownerMap = await fetchOwnerMeta([user.id]);
        const enrichedRow = applyOwnerMeta([insertedRow], ownerMap)[0] || insertedRow;

        if (enrichedRow && !plantMarkers[enrichedRow.id]) {
          renderMarker(enrichedRow);
        }

        return normalizePlant(enrichedRow);
      }

      function addPlantUpdate(id) {
        const p = plantCache[id];
        if (p) {
          openSidebar(p);
        }
      }

      function injectMapControls() {
        if (document.getElementById("plantHereBtn")) return;
        const topbar = document.querySelector(".topbar");
        if (!topbar) return;

        const controls = document.createElement("div");
        controls.style.display = "flex";
        controls.style.alignItems = "center";
        controls.style.gap = "10px";
        controls.innerHTML = `
          <label style="display:inline-flex;align-items:center;gap:6px;font-size:0.88rem;">
            <input id="showMineSwitch" type="checkbox" />
            Show only my plants
          </label>
          <button id="plantHereBtn" type="button" style="border:none;border-radius:8px;padding:8px 12px;color:#fff;background:#2e7d32;cursor:pointer;font-weight:600;">
            Plant Here
          </button>
        `;
        topbar.appendChild(controls);

        const showMineSwitch = document.getElementById("showMineSwitch");
        const plantHereBtn = document.getElementById("plantHereBtn");

        showMineSwitch.checked = showOnlyMine;
        showMineSwitch.addEventListener("change", async (event) => {
          showOnlyMine = Boolean(event.target.checked);
          await reloadPlants();
        });

        plantHereBtn.addEventListener("click", () => {
          if (!navigator.geolocation) {
            alert("Geolocation is not supported in this browser.");
            return;
          }

          plantHereBtn.disabled = true;
          const originalLabel = plantHereBtn.textContent;
          plantHereBtn.textContent = "Locating...";

          navigator.geolocation.getCurrentPosition(
            async (position) => {
              try {
                const { latitude, longitude } = position.coords;
                const created = await createPlantAtLocation(latitude, longitude);
                if (created) {
                  map.setView([created.lat, created.lng], 16);
                }
              } catch (error) {
                console.error("[plantHereBtn] Failed:", error);
                alert(error.message || "Unable to plant here.");
              } finally {
                plantHereBtn.disabled = false;
                plantHereBtn.textContent = originalLabel;
              }
            },
            (geoError) => {
              console.error("[plantHereBtn] Geolocation failed:", geoError);
              alert(
                geoError.code === 1
                  ? "Location permission denied."
                  : "Unable to get your location.",
              );
              plantHereBtn.disabled = false;
              plantHereBtn.textContent = originalLabel;
            },
            { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 },
          );
        });
      }

      function closeSidebar() {
        plantSidebar.classList.remove("open");
        plantSidebar.setAttribute("aria-hidden", "true");
      }

      async function openSidebar(plant) {
        selectedPlant = plant;
        const ownerText = plant.owner?.email || plant.owner_email || plant.owner_id || "N/A";
        plantInfo.innerHTML = `
          <div><span class="label">Name:</span>${escapeHtml(plant.plant_name || "Plant")}</div>
          <div><span class="label">Owner:</span>${escapeHtml(ownerText)}</div>
          <div><span class="label">Planted:</span>${escapeHtml(formatDate(plant.created_at || plant.planted_date))}</div>
        `;
        plantSidebar.classList.add("open");
        plantSidebar.setAttribute("aria-hidden", "false");
        await loadPlantLogs(plant.id);
      }

      async function loadPlantLogs(plantId) {
        plantLogs.innerHTML = `<div class="empty-state">Loading updates...</div>`;

        const { data, error } = await _supabase
          .from("plant_logs")
          .select("*")
          .eq("plant_id", plantId)
          .order("created_at", { ascending: false });

        if (error) {
          console.error("[loadPlantLogs] Failed:", error);
          plantLogs.innerHTML = `<div class="empty-state">Failed to load updates.</div>`;
          return;
        }

        if (!data || data.length === 0) {
          plantLogs.innerHTML = `<div class="empty-state">No updates yet.</div>`;
          return;
        }

        plantLogs.innerHTML = data
          .map((log) => {
            const note = log.note
              ? `<p class="log-note">${escapeHtml(log.note)}</p>`
              : "";
            const image = log.image_url
              ? `<img class="log-image" src="${escapeHtml(log.image_url)}" alt="Plant update image" />`
              : "";
            return `
              <article class="log-card">
                ${note}
                ${image}
                <div class="log-time">${escapeHtml(formatDate(log.created_at))}</div>
                <div class="log-actions">
                  <button
                    class="log-delete-btn"
                    type="button"
                    data-log-id="${escapeHtml(log.id)}"
                    data-image-url="${escapeHtml(log.image_url || "")}"
                  >
                    Delete
                  </button>
                </div>
              </article>
            `;
          })
          .join("");
      }

      async function deleteLog(logId, imageUrl) {
        if (!confirm("Are you sure you want to delete this log?")) return;

        try {
          const { error: deleteError } = await _supabase
            .from("plant_logs")
            .delete()
            .eq("id", logId);
          if (deleteError) {
            console.error("[deleteLog] Failed to delete log row:", deleteError);
            return;
          }

          if (imageUrl) {
            try {
              const parsedUrl = new URL(imageUrl, window.location.origin);
              const marker = "/storage/v1/object/public/plant-images/";
              const index = parsedUrl.pathname.indexOf(marker);
              if (index !== -1) {
                const filePath = decodeURIComponent(
                  parsedUrl.pathname.slice(index + marker.length),
                );
                if (filePath) {
                  const { error: storageError } = await _supabase.storage
                    .from("plant-images")
                    .remove([filePath]);
                  if (storageError) {
                    console.error(
                      "[deleteLog] Failed to delete storage image:",
                      storageError,
                    );
                  }
                }
              }
            } catch (storageParseError) {
              console.error(
                "[deleteLog] Failed to parse image URL:",
                storageParseError,
              );
            }
          }

          if (selectedPlant?.id) {
            await loadPlantLogs(selectedPlant.id);
          await reloadPlants();
          }
        } catch (error) {
          console.error("[deleteLog] Unexpected error:", error);
        }
      }
      async function uploadPlantImages(plantId, files, note) {
        if (!plantId) return [];

        const list = Array.from(files || []).filter(
          (file) => file && file.type && file.type.startsWith("image/"),
        );
        const trimmedNote = (note || "").trim();
        const uploadedUrls = [];

        if (list.length === 0) {
          if (trimmedNote) {
            const { error: noteError } = await _supabase
              .from("plant_logs")
              .insert({
                plant_id: plantId,
                image_url: null,
                note: trimmedNote,
              });
            if (noteError) {
              console.error(
                "[uploadPlantImages] Note insert failed:",
                noteError,
              );
            }
          }
          return uploadedUrls;
        }

        for (let index = 0; index < list.length; index += 1) {
          const file = list[index];
          const fileName = `${Date.now()}-${index}-${file.name}`;

          try {
            const { error: uploadError } = await _supabase.storage
              .from("plant-images")
              .upload(fileName, file);
            if (uploadError) {
              console.error(
                `[uploadPlantImages] Upload failed (${file.name}):`,
                uploadError,
              );
              continue;
            }

            const { data: publicData } = _supabase.storage
              .from("plant-images")
              .getPublicUrl(fileName);
            const imageUrl = publicData?.publicUrl;
            if (!imageUrl) {
              console.error(
                `[uploadPlantImages] Public URL missing (${file.name}).`,
              );
              continue;
            }

            const { error: logError } = await _supabase
              .from("plant_logs")
              .insert({
                plant_id: plantId,
                image_url: imageUrl,
                note: trimmedNote || null,
              });
            if (logError) {
              console.error(
                `[uploadPlantImages] Insert failed (${file.name}):`,
                logError,
              );
              continue;
            }

            uploadedUrls.push(imageUrl);
          } catch (error) {
            console.error(
              `[uploadPlantImages] Unexpected error (${file.name}):`,
              error,
            );
          }
        }

        return uploadedUrls;
      }
      async function handleClick(e) {
        if (Date.now() - last < 3000) return;
        last = Date.now();

        const { lat, lng } = e.latlng;

        try {
          await createPlantAtLocation(lat, lng);
        } catch (error) {
          alert(error.message || "Create point failed.");
        }
      }

      // REALTIME
      function realtime() {
        _supabase
          .channel("plants")
          .on(
            "postgres_changes",
            { event: "INSERT", schema: "public", table: "plants" },
            async (payload) => {
              if (showOnlyMine && currentUserId && payload.new.owner_id !== currentUserId) {
                return;
              }
              await reloadPlants();
            },
          )
          .on(
            "postgres_changes",
            { event: "DELETE", schema: "public", table: "plants" },
            (payload) => {
              const id = payload.old.id;
              if (plantMarkers[id]) {
                map.removeLayer(plantMarkers[id]);
                delete plantMarkers[id];
              }
              delete plantCache[id];
            },
          )
          .subscribe();
      }

      // ACTIONS
      function viewInfo(id) {
        alert("Plant ID: " + id);
      }

      async function deletePlant(id) {
        const plant = plantCache[id];
        if (!plant) return;
        if (!currentUserId || plant.owner_id !== currentUserId) {
          alert("You can only delete your own plants.");
          return;
        }

        if (!confirm("Delete plant?")) return;

        const { error } = await _supabase.from("plants").delete().eq("id", id);
        if (error) {
          console.error("[deletePlant] Failed:", error);
          return;
        }

        if (plantMarkers[id]) {
          map.removeLayer(plantMarkers[id]);
          delete plantMarkers[id];
        }
        delete plantCache[id];
      }

      closePlantSidebarBtn.addEventListener("click", closeSidebar);
      plantLogs.addEventListener("click", async (event) => {
        const button = event.target.closest(".log-delete-btn");
        if (!button) return;

        const logId = button.dataset.logId;
        const imageUrl = button.dataset.imageUrl || null;
        if (!logId) return;

        await deleteLog(logId, imageUrl);
      });

      addUpdateBtn.addEventListener("click", async () => {
        if (!selectedPlant) return;

        addUpdateBtn.disabled = true;
        const originalLabel = addUpdateBtn.textContent;
        addUpdateBtn.textContent = "Uploading...";

        try {
          await uploadPlantImages(
            selectedPlant.id,
            logFilesInput.files,
            logNoteInput.value,
          );
          logFilesInput.value = "";
          logNoteInput.value = "";
          await loadPlantLogs(selectedPlant.id);
          await reloadPlants();
        } catch (error) {
          console.error("[addUpdateBtn] Failed:", error);
        } finally {
          addUpdateBtn.disabled = false;
          addUpdateBtn.textContent = originalLabel;
        }
      });
      window.viewInfo = viewInfo;
      window.deletePlant = deletePlant;
      window.addPlantUpdate = addPlantUpdate;

      window.addEventListener("beforeunload", () => {
        if (userLocationWatchId !== null) {
          navigator.geolocation.clearWatch(userLocationWatchId);
        }
      });
    </script>
  </body>
</html>
